name: Build and Deploy Angular (Frontend/app) to Azure Static Web Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Frontend/app/package-lock.json

      # 3️⃣ Install dependencies
      - name: Install dependencies
        working-directory: Frontend/app
        run: npm ci

      # 4️⃣ Build Angular app
      - name: Build Angular app
        working-directory: Frontend/app
        run: npm run build -- --configuration production

      # 5️⃣ Deploy
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "Frontend/app"
          api_location: ""
          output_location: "dist/YOUR_PROJECT_NAME/browser"

      